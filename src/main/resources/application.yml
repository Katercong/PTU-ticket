server:
  port: 8080

spring:
  application:
    name: ptu-ticket
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ptu_ticket?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PWD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      # password: 

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ticket-producer-group

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
